<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dune: Awakening - Coriolis Storm Countdown</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
        }
        
        .container {
            text-align: center;
            padding-left: 40px;
            padding-right: 40px;
            padding-top: 20px;
            padding-bottom: 20px;
            margin-left: 40px;
            margin-right: 40px;
            margin-top: 40px;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.3);
        }
        
        h1 {
            margin: 10px 0;
            font-size: 2.5vh;
        }
        
        .countdown {
            font-size: 4vh;
            color: #ffa500;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }
        
        .note{
          font-size: 2vh;
          text-align: center;
        }
        
        .controls {
            margin: 10px;
            font-size: 2vh;
        }
        
        .controls label {
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .controls input[type="checkbox"] {
            width: 10vh;
            height: 10vh;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dune: Awakening - Coriolis Storm Countdown for Europe server</h1>
        <h1 class="countdown">Time remaining:<br><span id="countdown_clock"></span></h1>
        <div class="controls">
            <label>
                <input type="checkbox" id="soundToggle" checked>
                Enable sound alerts (on 5 minutes left and on time zero)
            </label>
        </div>
        <article class="note">
        note: this counter just assumes that the storm happens every monday at 18:00 of UTC+0, the countdown will be wrong if that ever changes.
        </article>
    </div>
    <article class="note">
      QR code below for if you wanna bring up the counter on your phone.
      <br>
      <img src="QR.webp" style="width: 20vw;"></img>
    </article>

    <script>
        let alerted5Minutes = false;
        let alerted10seconds = false;
        let audioContext = null;
        document.getElementById('soundToggle').checked = false;
        
        function updateCountdown() {
            // Get current time in UTC
            const now = new Date();
            
            // Calculate next Monday at 18:00 UTC
            let nextEvent = new Date(now);
            nextEvent.setUTCHours(18, 0, 0, 0);
            
            // If today is Monday and it's before 18 UTC, use today
            // Otherwise, move to next Monday
            const dayOfWeek = nextEvent.getUTCDay();
            const daysUntilMonday = dayOfWeek === 1 ? 0 : (8 - dayOfWeek) % 7;
            
            if (daysUntilMonday > 0 || nextEvent <= now) {
                nextEvent.setUTCDate(nextEvent.getUTCDate() + (daysUntilMonday === 0 && nextEvent <= now ? 7 : daysUntilMonday));
            }
            
            // Calculate time difference
            const timeDiff = nextEvent - now;
            
            const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);
            
            // Update the span
            document.getElementById('countdown_clock').innerHTML = 
                `${days} days <br> ${hours} hours <br> ${minutes} minutes <br> ${seconds} seconds`;
            
            // Check if we've hit 5 minutes remaining
            if (timeDiff <= 5 * 60 * 1000 && timeDiff > 0 && !alerted5Minutes) {
                alerted5Minutes = true;
                playAlertSound();
            }
            
            // Check if we've hit zero
            if (timeDiff <= 10*1000 && !alerted10seconds) {
                alerted10seconds = true;
                playAlertSound();
                // Reset flags for next week
                setTimeout(() => {
                    alerted5Minutes = false;
                    alerted10seconds = false;
                }, 1000);
            }
            
            function playAlertSound() {
            // Initialize AudioContext on first user interaction
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            const now = audioContext.currentTime;
            const pingDuration = 0.75; // Duration of each ping
            const pauseDuration = 0.0; // Pause between pings
            
            // Play 5 pings
            for (let i = 0; i < 5; i++) {
                const startTime = now + (i * (pingDuration + pauseDuration));
                
                // First oscillator at 800Hz
                const oscillator1 = audioContext.createOscillator();
                const gainNode1 = audioContext.createGain();
                oscillator1.connect(gainNode1);
                gainNode1.connect(audioContext.destination);
                oscillator1.frequency.value = 800;
                oscillator1.type = 'sawtooth';
                gainNode1.gain.setValueAtTime(0.15, startTime);
                gainNode1.gain.exponentialRampToValueAtTime(0.01, startTime + pingDuration);
                oscillator1.start(startTime);
                oscillator1.stop(startTime + pingDuration);
                
                // Second oscillator at 650Hz
                const oscillator2 = audioContext.createOscillator();
                const gainNode2 = audioContext.createGain();
                oscillator2.connect(gainNode2);
                gainNode2.connect(audioContext.destination);
                oscillator2.frequency.value = 650;
                oscillator2.type = 'sawtooth';
                gainNode2.gain.setValueAtTime(0.15, startTime);
                gainNode2.gain.exponentialRampToValueAtTime(0.01, startTime + pingDuration);
                oscillator2.start(startTime);
                oscillator2.stop(startTime + pingDuration);
            }
        }

            
            // Initialize AudioContext when checkbox is first clicked
            document.getElementById('soundToggle').addEventListener('change', function() {
                if (this.checked && !audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
            });
            
            // Update every second
            setTimeout(updateCountdown, 1000);
        }
        
        // Start the countdown when the page loads
        updateCountdown();
    </script>
</body>
</html>
